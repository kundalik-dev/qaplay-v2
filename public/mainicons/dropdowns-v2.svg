<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <style>
    .outline { stroke: #313d40; stroke-width: 16px; stroke-linecap: round; stroke-linejoin: round; }
    .thin-outline { stroke: #313d40; stroke-width: 8px; stroke-linecap: round; stroke-linejoin: round; }
    .divider { stroke: #313d40; stroke-width: 8px; stroke-linecap: round; }
  </style>

  <!-- Expanded dropdown menu list box (background/below) -->
  <rect x="60" y="190" width="392" height="240" rx="24" fill="#ffffff" class="outline"/>

  <!-- List options content -->
  <!-- Option 1 -->
  <rect x="76" y="206" width="360" height="60" rx="12" fill="#f6f8fa"/>
  <rect x="100" y="224" width="160" height="24" rx="12" fill="#d1d5da"/>

  <!-- Option 2 (Selected with Blue Fill) -->
  <rect x="76" y="280" width="360" height="60" rx="12" fill="#53a3ec" stroke="#313d40" stroke-width="8" stroke-linejoin="round"/>
  <rect x="100" y="298" width="160" height="24" rx="12" fill="#ffffff"/>
  <!-- Cute Face on the Selected Option -->
  <circle cx="320" cy="306" r="6" fill="#313d40"/>
  <circle cx="344" cy="306" r="6" fill="#313d40"/>
  <ellipse cx="308" cy="312" rx="6" ry="4" fill="#ff8e9e"/>
  <ellipse cx="356" cy="312" rx="6" ry="4" fill="#ff8e9e"/>
  <path d="M 327 313 Q 332 318 337 313" stroke="#313d40" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Option 3 -->
  <rect x="76" y="354" width="360" height="60" rx="12" fill="#f6f8fa"/>
  <rect x="100" y="372" width="160" height="24" rx="12" fill="#d1d5da"/>

  <!-- Main dropdown selector header (foreground/top) -->
  <rect x="60" y="80" width="392" height="90" rx="24" fill="#fcf5af" class="outline"/>
  <!-- Text capsule inside selector header -->
  <rect x="95" y="110" width="200" height="30" rx="15" fill="#fbf1cf" class="thin-outline"/>
  <!-- Dropdown Chevron Arrow -->
  <path d="M 380 118 L 400 138 L 420 118" stroke="#313d40" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Sparkles -->
  <!-- Yellow Star Top Right -->
  <path d="M 440 60 L 450 45 M 450 60 L 440 45 M 445 35 V 70 M 425 52 H 465" stroke="#fcf5af" stroke-width="6" stroke-linecap="round"/>
  <!-- Pink Star Bottom Left -->
  <path d="M 50 430 L 60 415 M 60 430 L 50 415 M 55 405 V 440 M 35 422 H 75" stroke="#eda1ab" stroke-width="6" stroke-linecap="round"/>
  <!-- Cyan Star Top Left -->
  <path d="M 80 50 L 90 40 M 90 50 L 80 40 M 85 32 V 58 M 70 45 H 100" stroke="#81d9e7" stroke-width="6" stroke-linecap="round"/>
</svg>
