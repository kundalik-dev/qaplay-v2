<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <style>
    .outline { stroke: #313d40; stroke-width: 16px; stroke-linecap: round; stroke-linejoin: round; }
    .thin-outline { stroke: #313d40; stroke-width: 8px; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Main Grid/Table Body -->
  <rect x="60" y="80" width="392" height="360" rx="30" fill="#ffffff" class="outline"/>

  <!-- Table Header Background (clipped to top curve) -->
  <path d="M 60 160 V 110 A 30 30 0 0 1 90 80 H 422 A 30 30 0 0 1 452 110 V 160 Z" fill="#eda1ab" stroke="#313d40" stroke-width="16" stroke-linejoin="round"/>

  <!-- Column Dividers -->
  <line x1="170" y1="80" x2="170" y2="440" stroke="#313d40" stroke-width="12" stroke-linecap="round"/>
  <line x1="310" y1="80" x2="310" y2="440" stroke="#313d40" stroke-width="12" stroke-linecap="round"/>

  <!-- Row Dividers -->
  <line x1="60" y1="160" x2="452" y2="160" stroke="#313d40" stroke-width="16" stroke-linecap="round"/>
  <line x1="60" y1="250" x2="452" y2="250" stroke="#313d40" stroke-width="12" stroke-linecap="round"/>
  <line x1="60" y1="340" x2="452" y2="340" stroke="#313d40" stroke-width="12" stroke-linecap="round"/>

  <!-- Header Text Placeholders -->
  <rect x="85" y="105" width="60" height="24" rx="12" fill="#e16e7e"/>
  <rect x="195" y="105" width="90" height="24" rx="12" fill="#e16e7e"/>
  <rect x="335" y="105" width="70" height="24" rx="12" fill="#e16e7e"/>

  <!-- Row 1 Content -->
  <circle cx="115" cy="205" r="18" fill="#53a3ec" stroke="#313d40" stroke-width="6"/>
  <rect x="190" y="195" width="100" height="20" rx="10" fill="#d1d5da"/>
  <rect x="330" y="195" width="70" height="20" rx="10" fill="#b3e59f" stroke="#313d40" stroke-width="6"/>

  <!-- Row 2 Content (With cute smiling badge!) -->
  <circle cx="115" cy="295" r="18" fill="#fcf5af" stroke="#313d40" stroke-width="6"/>
  <rect x="190" y="285" width="100" height="20" rx="10" fill="#d1d5da"/>
  <rect x="325" y="275" width="100" height="38" rx="19" fill="#fbf1cf" stroke="#313d40" stroke-width="8"/>
  <!-- Smile face detail inside badge -->
  <circle cx="362" cy="292" r="4" fill="#313d40"/>
  <circle cx="388" cy="292" r="4" fill="#313d40"/>
  <circle cx="352" cy="295" r="3" fill="#ff8e9e"/>
  <circle cx="398" cy="295" r="3" fill="#ff8e9e"/>
  <path d="M 370 297 Q 375 302 380 297" stroke="#313d40" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Row 3 Content -->
  <circle cx="115" cy="385" r="18" fill="#eda1ab" stroke="#313d40" stroke-width="6"/>
  <rect x="190" y="375" width="80" height="20" rx="10" fill="#d1d5da"/>
  <rect x="330" y="375" width="60" height="20" rx="10" fill="#d1d5da"/>

  <!-- Magnifying glass / Search detail at top right -->
  <g transform="translate(40, -10)">
    <line x1="390" y1="130" x2="440" y2="180" stroke="#313d40" stroke-width="16" stroke-linecap="round"/>
    <circle cx="360" cy="100" r="32" fill="#81d9e7" stroke="#313d40" stroke-width="12"/>
    <path d="M 345 85 A 20 20 0 0 1 375 80" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>

  <!-- Sparkles -->
  <path d="M 40 60 L 50 48 M 50 60 L 40 48 M 45 40 V 68 M 32 54 H 58" stroke="#fcf5af" stroke-width="6" stroke-linecap="round"/>
</svg>
